name: "ansible-telegraf"
on:
  push:
    paths:
      - 'defaults/**'
      - 'files/**'
      - 'handlers/**'
      - 'meta/**'
      - 'molecule/**'
      - 'tasks/**'
      - 'templates/**'
      - '.github/workflows/telegraf.yml'
  pull_request:
    paths:
      - 'defaults/**'
      - 'files/**'
      - 'handlers/**'
      - 'meta/**'
      - 'molecule/**'
      - 'tasks/**'
      - 'templates/**'
      - '.github/workflows/telegraf.yml'
jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        molecule_distro:
          # rocky9 dropped: geerlingguy image hits a sudo/PAM bug under
          # docker-ce on GitHub Actions runners. Using rocky10 instead.
          - container: rocky10
            image: geerlingguy/docker-rockylinux10-ansible:latest
          - container: ubuntu2404
            image: geerlingguy/docker-ubuntu2404-ansible:latest
          - container: ubuntu2204
            image: geerlingguy/docker-ubuntu2204-ansible:latest
          - container: ubuntu2004
            image: geerlingguy/docker-ubuntu2004-ansible:latest
          # debian10 dropped: EOL and ships Python 3.7, incompatible with
          # ansible-core 2.19 (requires Python 3.8+ on managed nodes).
          - container: debian11
            image: geerlingguy/docker-debian11-ansible:latest
          - container: debian12
            image: geerlingguy/docker-debian12-ansible:latest
          - container: debian13
            image: geerlingguy/docker-debian13-ansible:latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.11

      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt

      - name: Install test dependencies.
        run: pip3 install -r requirements.txt

      - name: Run role tests on empty systems in check-mode
        env:
          MY_MOLECULE_CONTAINER: ${{ matrix.molecule_distro.container }}
          MY_MOLECULE_IMAGE: ${{ matrix.molecule_distro.image }}
          MY_MOLECULE_GROUP: ${{ matrix.molecule_distro.group }}
          MY_MOLECULE_DOCKER_COMMAND: ${{ matrix.molecule_distro.command }}
        run: molecule test -s empty-checkmode

      - name: Run role tests
        env:
          MY_MOLECULE_CONTAINER: ${{ matrix.molecule_distro.container }}
          MY_MOLECULE_IMAGE: ${{ matrix.molecule_distro.image }}
          MY_MOLECULE_GROUP: ${{ matrix.molecule_distro.group }}
          MY_MOLECULE_DOCKER_COMMAND: ${{ matrix.molecule_distro.command }}
        run: molecule test
