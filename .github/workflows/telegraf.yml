name: "ansible-telegraf"
on:
  push:
    paths:
      - 'defaults/**'
      - 'files/**'
      - 'handlers/**'
      - 'meta/**'
      - 'molecule/**'
      - 'tasks/**'
      - 'templates/**'
      - '.github/workflows/telegraf.yml'
  pull_request:
    paths:
      - 'defaults/**'
      - 'files/**'
      - 'handlers/**'
      - 'meta/**'
      - 'molecule/**'
      - 'tasks/**'
      - 'templates/**'
      - '.github/workflows/telegraf.yml'
jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        molecule_distro:
          # - container: rocky8
          #   image: geerlingguy/docker-rockylinux8-ansible
          - container: rocky9
            image: geerlingguy/docker-rockylinux9-ansible
          - container: ubuntu2204
            image: geerlingguy/docker-ubuntu2204-ansible:latest
          - container: ubuntu2004
            image: geerlingguy/docker-ubuntu2004-ansible:latest
          # - container: ubuntu1804
          #   image: geerlingguy/docker-ubuntu1804-ansible:latest
          - container: debian10
            image: geerlingguy/docker-debian10-ansible:latest
          - container: debian11
            image: geerlingguy/docker-debian11-ansible:latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11.11

      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt

      - name: Install test dependencies.
        run: pip3 install -r requirements.txt

      - name: DEBUG - validate molecule.yml against bundled schema
        run: |
          python - <<'EOF'
          import json, os, molecule, jsonschema
          from molecule.util import safe_load_file
          schema_path = os.path.join(os.path.dirname(molecule.__file__), "data", "molecule.json")
          schema = json.load(open(schema_path))
          for f in ["molecule/default/molecule.yml", "molecule/empty-checkmode/molecule.yml"]:
              data = safe_load_file(f)
              validator = jsonschema.Draft202012Validator(schema)
              errors = sorted(validator.iter_errors(data), key=str)
              print(f"==== {f}: {len(errors)} error(s) ====")
              for e in errors:
                  print("  PATH:", list(e.absolute_path), "| MSG:", e.message)
          EOF

      - name: Run role tests on empty systems in check-mode
        env:
          MY_MOLECULE_CONTAINER: ${{ matrix.molecule_distro.container }}
          MY_MOLECULE_IMAGE: ${{ matrix.molecule_distro.image }}
          MY_MOLECULE_GROUP: ${{ matrix.molecule_distro.group }}
          MY_MOLECULE_DOCKER_COMMAND: ${{ matrix.molecule_distro.command }}
        run: molecule --debug test -s empty-checkmode

      - name: Run role tests
        env:
          MY_MOLECULE_CONTAINER: ${{ matrix.molecule_distro.container }}
          MY_MOLECULE_IMAGE: ${{ matrix.molecule_distro.image }}
          MY_MOLECULE_GROUP: ${{ matrix.molecule_distro.group }}
          MY_MOLECULE_DOCKER_COMMAND: ${{ matrix.molecule_distro.command }}
        run: molecule test
